<svg xmlns="http://www.w3.org/2000/svg" width="2500" height="1686" viewBox="0 0 2500 1686">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
    <linearGradient id="card-top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFF8F0"/>
    </linearGradient>
    <linearGradient id="card-bottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8F0"/>
      <stop offset="100%" stop-color="#FFF3E0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="2500" height="1686" fill="url(#bg)"/>

  <!-- Upper row cards -->
  <rect x="24" y="24" width="794" height="795" fill="url(#card-top)" rx="24"/>
  <rect x="853" y="24" width="794" height="795" fill="url(#card-top)" rx="24"/>
  <rect x="1682" y="24" width="794" height="795" fill="url(#card-top)" rx="24"/>

  <!-- Lower row cards -->
  <rect x="24" y="867" width="794" height="795" fill="url(#card-bottom)" rx="24"/>
  <rect x="853" y="867" width="794" height="795" fill="url(#card-bottom)" rx="24"/>
  <rect x="1682" y="867" width="794" height="795" fill="url(#card-bottom)" rx="24"/>

  <!-- === Upper Left: Record === -->
  <g transform="translate(421, 250)">
    <circle cx="0" cy="0" r="100" fill="none" stroke="#FF8A65" stroke-width="8"/>
    <polyline points="-38,4 -12,36 40,-28" fill="none" stroke="#FF8A65" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="421" y="480" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="90" font-weight="700" fill="#4E342E">Record</text>
  <text x="421" y="560" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="52" fill="#8D6E63">今日の記録</text>

  <!-- === Upper Center: Habits === -->
  <g transform="translate(1250, 250)">
    <circle cx="-60" cy="-38" r="12" fill="#FF8A65"/>
    <line x1="-34" y1="-38" x2="60" y2="-38" stroke="#FF8A65" stroke-width="9" stroke-linecap="round"/>
    <circle cx="-60" cy="4" r="12" fill="#FFAB91"/>
    <line x1="-34" y1="4" x2="60" y2="4" stroke="#FFAB91" stroke-width="9" stroke-linecap="round"/>
    <circle cx="-60" cy="46" r="12" fill="#FFCC80"/>
    <line x1="-34" y1="46" x2="60" y2="46" stroke="#FFCC80" stroke-width="9" stroke-linecap="round"/>
  </g>
  <text x="1250" y="480" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="90" font-weight="700" fill="#4E342E">Habits</text>
  <text x="1250" y="560" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="52" fill="#8D6E63">習慣一覧</text>

  <!-- === Upper Right: Settings === -->
  <g transform="translate(2079, 250)">
    <circle cx="0" cy="0" r="36" fill="none" stroke="#FF8A65" stroke-width="8"/>
    <circle cx="0" cy="0" r="16" fill="#FF8A65"/>
    <line x1="0" y1="-52" x2="0" y2="-70" stroke="#FF8A65" stroke-width="11" stroke-linecap="round"/>
    <line x1="0" y1="52" x2="0" y2="70" stroke="#FF8A65" stroke-width="11" stroke-linecap="round"/>
    <line x1="-52" y1="0" x2="-70" y2="0" stroke="#FF8A65" stroke-width="11" stroke-linecap="round"/>
    <line x1="52" y1="0" x2="70" y2="0" stroke="#FF8A65" stroke-width="11" stroke-linecap="round"/>
    <line x1="-37" y1="-37" x2="-50" y2="-50" stroke="#FF8A65" stroke-width="11" stroke-linecap="round"/>
    <line x1="37" y1="-37" x2="50" y2="-50" stroke="#FF8A65" stroke-width="11" stroke-linecap="round"/>
    <line x1="-37" y1="37" x2="-50" y2="50" stroke="#FF8A65" stroke-width="11" stroke-linecap="round"/>
    <line x1="37" y1="37" x2="50" y2="50" stroke="#FF8A65" stroke-width="11" stroke-linecap="round"/>
  </g>
  <text x="2079" y="480" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="90" font-weight="700" fill="#4E342E">Settings</text>
  <text x="2079" y="560" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="52" fill="#8D6E63">設定</text>

  <!-- === Lower Left: Log === -->
  <g transform="translate(421, 1090)">
    <path d="M-55,-46 L-55,46 Q0,30 0,30 Q0,30 55,46 L55,-46 Q0,-30 0,-30 Q0,-30 -55,-46 Z" fill="none" stroke="#E64A19" stroke-width="7" stroke-linejoin="round"/>
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#E64A19" stroke-width="5"/>
    <line x1="-38" y1="-20" x2="-14" y2="-20" stroke="#FFAB91" stroke-width="5" stroke-linecap="round"/>
    <line x1="-38" y1="-4" x2="-14" y2="-4" stroke="#FFAB91" stroke-width="5" stroke-linecap="round"/>
    <line x1="-38" y1="12" x2="-20" y2="12" stroke="#FFAB91" stroke-width="5" stroke-linecap="round"/>
    <line x1="14" y1="-20" x2="38" y2="-20" stroke="#FFAB91" stroke-width="5" stroke-linecap="round"/>
    <line x1="14" y1="-4" x2="38" y2="-4" stroke="#FFAB91" stroke-width="5" stroke-linecap="round"/>
    <line x1="14" y1="12" x2="30" y2="12" stroke="#FFAB91" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="421" y="1320" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="90" font-weight="700" fill="#5D4037">Log</text>
  <text x="421" y="1400" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="52" fill="#8D6E63">日次ログ</text>

  <!-- === Lower Center: Tracker === -->
  <g transform="translate(1250, 1090)">
    <rect x="-55" y="14" width="22" height="40" rx="4" fill="#FFCC80"/>
    <rect x="-24" y="-12" width="22" height="66" rx="4" fill="#FFAB91"/>
    <rect x="7" y="-34" width="22" height="88" rx="4" fill="#FF8A65"/>
    <rect x="38" y="-54" width="22" height="108" rx="4" fill="#E64A19"/>
    <line x1="-64" y1="56" x2="68" y2="56" stroke="#5D4037" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="1250" y="1320" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="90" font-weight="700" fill="#5D4037">Tracker</text>
  <text x="1250" y="1400" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="52" fill="#8D6E63">月間トラッカー</text>

  <!-- === Lower Right: Help === -->
  <g transform="translate(2079, 1090)">
    <circle cx="0" cy="0" r="62" fill="none" stroke="#E64A19" stroke-width="7"/>
    <path d="M-18,-24 Q-18,-44 0,-44 Q18,-44 18,-24 Q18,-12 0,-6" fill="none" stroke="#E64A19" stroke-width="9" stroke-linecap="round"/>
    <circle cx="0" cy="20" r="7" fill="#E64A19"/>
  </g>
  <text x="2079" y="1320" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="90" font-weight="700" fill="#5D4037">Help</text>
  <text x="2079" y="1400" text-anchor="middle" font-family="-apple-system, 'Hiragino Sans', sans-serif" font-size="52" fill="#8D6E63">使い方</text>
</svg>
